name: docker-image

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref_name }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/unstableneutron/cliproxyapi

jobs:
  build:
    name: build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, platform: linux/amd64, scope: amd64 }
          - { runner: ubuntu-24.04-arm, platform: linux/arm64, scope: arm64 }
    steps:
      - uses: actions/checkout@v6
      - id: metadata
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_date=$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/setup-buildx-action@v3
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=docker-${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.scope }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ steps.metadata.outputs.commit }}
            BUILD_DATE=${{ steps.metadata.outputs.build_date }}
      - name: Record digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: mkdir -p digests && touch "digests/${DIGEST#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.scope }}
          path: digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: digests
          pattern: digest-*
          merge-multiple: true
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/setup-buildx-action@v3
      - name: Create and verify tagged manifest
        run: |
          set -euo pipefail
          mapfile -t files < <(find digests -type f | sort)
          [[ ${#files[@]} -eq 2 ]] || { echo "expected two digests" >&2; exit 1; }
          refs=(); for file in "${files[@]}"; do refs+=("${IMAGE}@sha256:${file##*/}"); done
          docker buildx imagetools create --tag "${IMAGE}:${GITHUB_REF_NAME}" "${refs[@]}"
          result="$(docker buildx imagetools inspect "${IMAGE}:${GITHUB_REF_NAME}")"
          grep -q 'Platform:.*linux/amd64' <<<"$result"
          grep -q 'Platform:.*linux/arm64' <<<"$result"

  promote-latest:
    runs-on: ubuntu-latest
    needs: manifest
    if: ${{ !contains(github.ref_name, '-') }}
    concurrency:
      group: docker-latest-promotion
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/setup-buildx-action@v3
      - name: Promote highest stable version
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          highest="$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)"
          if [[ "$GITHUB_REF_NAME" != "$highest" ]]; then
            echo "$GITHUB_REF_NAME is not highest stable tag ($highest); leaving latest unchanged"
            exit 0
          fi
          docker buildx imagetools create --tag "${IMAGE}:latest" "${IMAGE}:${GITHUB_REF_NAME}"
